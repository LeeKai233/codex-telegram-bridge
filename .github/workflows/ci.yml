name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - name: Install uv and Python 3.14
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.14"
          version: "0.11.28"
          enable-cache: true
          cache-python: true
      - name: Check lock file
        run: uv lock --check
      - name: Lint
        run: uv run --frozen ruff check .
      - name: Test
        run: uv run --frozen pytest
      - name: Build and smoke-test packaged entry points
        run: |
          uv build
          python - <<'PY'
          import tarfile
          from pathlib import Path, PurePosixPath

          sdist = next(Path("dist").glob("*.tar.gz"))
          with tarfile.open(sdist, "r:gz") as archive:
              members = [PurePosixPath(member.name) for member in archive.getmembers()]
          forbidden = {"assets", ".codegraph", ".gitnexus"}
          leaked = sorted(str(member) for member in members if forbidden & set(member.parts))
          if leaked:
              raise SystemExit(f"forbidden local files in sdist: {leaked}")
          PY
          export UV_TOOL_DIR="$RUNNER_TEMP/codex-tg-tools"
          export UV_TOOL_BIN_DIR="$RUNNER_TEMP/codex-tg-bin"
          uv tool install --python 3.14 .
          "$UV_TOOL_BIN_DIR/codex-tg" --help >/dev/null
          "$UV_TOOL_BIN_DIR/codex-telegram-bridge" --help >/dev/null

  installer:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - name: Install static analysis tools
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Check shell syntax
        run: bash -n install.sh
      - name: Run ShellCheck
        run: shellcheck install.sh
      - name: Verify systemd user units
        run: |
          mkdir -p ~/.local/bin
          touch ~/.local/bin/codex ~/.local/bin/codex-telegram-bridge
          chmod +x ~/.local/bin/codex ~/.local/bin/codex-telegram-bridge
          systemd-analyze --user verify systemd/*.service
